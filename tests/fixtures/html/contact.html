<!DOCTYPE html>
<html lang="en">
<head><title>Contact - Sweet Bakery</title></head>
<body>
  <h1>Contact Us</h1>
  <form method="POST" action="/contact/submit">
    <input type="text" name="sender_name" placeholder="Your Name" required />
    <input type="email" name="sender_email" placeholder="Your Email" required />
    <input type="text" name="subject" placeholder="Subject" required />
    <textarea name="body" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</body>
</html>
