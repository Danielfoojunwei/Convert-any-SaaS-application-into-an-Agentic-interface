openapi: 3.1.0
info:
  title: Agent Interface for http://127.0.0.1:33235
  description: Agent-optimized API with 14 tools. Generated by Agent-See.
  version: 0.1.0
paths:
  /tools/list_products:
    post:
      operationId: list_products
      summary: List all products in the bakery catalog
      tags:
      - products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                  description: Filter by product category
                  enum:
                  - cakes
                  - pastries
                  - bread
                  - custom
                limit:
                  type: integer
                  description: Number of results per page
                  default: 20
                page:
                  type: integer
                  description: Page number for pagination
                  default: 1
                query:
                  type: string
                  description: Search query for products
                min_price:
                  type: number
                  description: Minimum price filter
                max_price:
                  type: number
                  description: Maximum price filter
              required: []
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ''
                    name:
                      type: string
                      description: ''
                    description:
                      type: string
                      description: ''
                    price:
                      type: number
                      description: ''
                    currency:
                      type: string
                      description: ''
                    category:
                      type: string
                      description: ''
                    in_stock:
                      type: boolean
                      description: ''
                    images:
                      type: array
                      description: ''
                    image_url:
                      type: string
                      description: Product image URL
                  additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/get_product_details:
    post:
      operationId: get_product_details
      summary: Get full details for a specific product
      tags:
      - products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  description: Product identifier
                product_id:
                  type: string
                  description: Product identifier
              required:
              - productId
              - product_id
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ''
                  name:
                    type: string
                    description: ''
                  description:
                    type: string
                    description: ''
                  price:
                    type: number
                    description: ''
                  currency:
                    type: string
                    description: ''
                  category:
                    type: string
                    description: ''
                  in_stock:
                    type: boolean
                    description: ''
                  images:
                    type: array
                    description: ''
                  variants:
                    type: array
                    description: Product variants (size, color, etc.)
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/get_cart:
    post:
      operationId: get_cart
      summary: Get current shopping cart contents
      tags:
      - cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              required: []
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart_id:
                    type: string
                    description: ''
                  items:
                    type: array
                    description: ''
                  item_count:
                    type: integer
                    description: ''
                  subtotal:
                    type: number
                    description: ''
                  currency:
                    type: string
                    description: ''
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/add_to_cart:
    post:
      operationId: add_to_cart
      summary: Add a product to the shopping cart
      tags:
      - cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                  description: Product identifier
                quantity:
                  type: integer
                  description: Number of items to add
                  default: 1
                variant_id:
                  type: string
                  description: Product variant (size, flavor)
              required:
              - product_id
              - quantity
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart_id:
                    type: string
                    description: ''
                  items:
                    type: array
                    description: ''
                  item_count:
                    type: integer
                    description: ''
                  subtotal:
                    type: number
                    description: ''
                  currency:
                    type: string
                    description: ''
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/submit_checkout:
    post:
      operationId: submit_checkout
      summary: Initiate checkout - returns payment URL for confirmation
      tags:
      - checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shipping_address:
                  type: object
                  description: Delivery address
                email:
                  type: string
                  description: Customer email for confirmation
                shipping_method:
                  type: string
                  description: Selected shipping method
                full_name:
                  type: string
                  description: Full Name
                address:
                  type: string
                  description: Shipping Address
                zip_code:
                  type: string
                  description: ZIP Code
              required:
              - shipping_address
              - email
              - full_name
              - address
              - zip_code
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_id:
                    type: string
                    description: ''
                  payment_url:
                    type: string
                    description: ''
                  total:
                    type: number
                    description: ''
                  currency:
                    type: string
                    description: ''
                  expires_at:
                    type: string
                    description: When this checkout session expires
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/get_order_status:
    post:
      operationId: get_order_status
      summary: Get order status and tracking info
      tags:
      - orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                  description: Order identifier
                order_id:
                  type: string
                  description: Order identifier
              required:
              - orderId
              - order_id
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    description: ''
                  status:
                    type: string
                    description: ''
                  items:
                    type: array
                    description: ''
                  total:
                    type: number
                    description: ''
                  tracking_number:
                    type: string
                    description: ''
                  tracking_url:
                    type:
                    - string
                    - 'null'
                    description: Tracking URL
                  estimated_delivery:
                    type:
                    - string
                    - 'null'
                    description: Estimated delivery date
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/send_message:
    post:
      operationId: send_message
      summary: Send a message to the business
      tags:
      - contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sender_name:
                  type: string
                  description: Your Name
                sender_email:
                  type: string
                  description: Your Email
                subject:
                  type: string
                  description: Subject
                body:
                  type: string
                  description: Your Message
              required:
              - sender_name
              - sender_email
              - subject
              - body
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/search_items:
    post:
      operationId: search_items
      summary: Search for items on the site
      tags:
      - search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Search products...
              required: []
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/get_business_info:
    post:
      operationId: get_business_info
      summary: Get business contact information, hours, and location
      tags:
      - info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              required: []
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/check_inventory:
    post:
      operationId: check_inventory
      summary: Check real-time stock status for a product variant
      tags:
      - products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                  description: Product identifier
                variant_id:
                  type: string
                  description: Specific variant (size, color)
              required:
              - product_id
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  product_id:
                    type: string
                    description: Product ID
                  in_stock:
                    type: boolean
                    description: Whether in stock
                  quantity:
                    type: integer
                    description: Available quantity
                  restock_date:
                    type:
                    - string
                    - 'null'
                    description: Expected restock date
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/remove_from_cart:
    post:
      operationId: remove_from_cart
      summary: Remove a product from the shopping cart
      tags:
      - cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                  description: Product identifier to remove
                variant_id:
                  type: string
                  description: Specific variant to remove
              required:
              - product_id
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart_id:
                    type: string
                    description: Cart session ID
                  item_count:
                    type: integer
                    description: Remaining items
                  subtotal:
                    type: number
                    description: Updated subtotal
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/apply_coupon:
    post:
      operationId: apply_coupon
      summary: Apply a coupon or discount code to the cart
      tags:
      - cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Coupon or discount code
              required:
              - code
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied:
                    type: boolean
                    description: Whether the code was accepted
                  discount_amount:
                    type: number
                    description: Discount amount
                  new_subtotal:
                    type: number
                    description: Cart subtotal after discount
                  message:
                    type: string
                    description: Coupon status message
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/calculate_shipping:
    post:
      operationId: calculate_shipping
      summary: Calculate shipping options and costs for delivery address
      tags:
      - checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                zip_code:
                  type: string
                  description: Delivery ZIP/postal code
                country:
                  type: string
                  description: Delivery country code (ISO 3166-1 alpha-2)
                  default: US
              required:
              - zip_code
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    type: array
                    description: Available shipping options
                  cheapest_option:
                    type: object
                    description: Lowest cost option
                  fastest_option:
                    type: object
                    description: Fastest delivery option
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
  /tools/initiate_return:
    post:
      operationId: initiate_return
      summary: Start a return or refund request for an order
      tags:
      - orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                  description: Order identifier
                item_ids:
                  type: array
                  description: List of item IDs to return
                reason:
                  type: string
                  description: Reason for return
              required:
              - order_id
              - item_ids
              - reason
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  return_id:
                    type: string
                    description: Return request ID
                  status:
                    type: string
                    description: Return request status
                  return_label_url:
                    type:
                    - string
                    - 'null'
                    description: Return shipping label URL
                  refund_amount:
                    type: number
                    description: Expected refund amount
                additionalProperties: false
        '400':
          description: Invalid parameters
        '404':
          description: Resource not found
        '500':
          description: Server error
